        <h2 style="font-size:18px;font-weight:700;margin:24px 0 12px">Vanliga frågor</h2>
        <details><summary style="font-weight:600;cursor:pointer">Vad kostar en bil i månaden?</summary><p style="color:#64748b">En bil kostar mellan 1 038 och 11 928 kr/mån beroende på modell. Snittet för våra 80 modeller är cirka 6 110 kr/mån.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Vilken bil är billigast att äga?</summary><p style="color:#64748b">Fiat 500e 42 kWh Passion kostar bara 1 038 kr/mån — billigast av alla modeller vi jämfört.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Är elbil billigare än bensinbil?</summary><p style="color:#64748b">Det beror på modell. Billigaste elbilen (Fiat 500e, 1 038 kr/mån) är dyrare än billigaste hybriden (Fiat 500e, 1 038 kr/mån).</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Hur räknar Bilkoll?</summary><p style="color:#64748b">Vi summerar värdeminskning (baserad på verkliga begagnatpriser), drivmedel, fordonsskatt, försäkring, service, däck och besiktning. Alla priser från Skatteverket och AutoUncle.</p></details>
