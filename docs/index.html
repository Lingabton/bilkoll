        <h2 style="font-size:18px;font-weight:700;margin:24px 0 12px">Vanliga frågor</h2>
        <details><summary style="font-weight:600;cursor:pointer">Vad kostar en bil i månaden?</summary><p style="color:#64748b">En bil kostar mellan 4 028 och 8 870 kr/mån beroende på modell. Snittet för våra 23 modeller är cirka 6 200 kr/mån.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Vilken bil är billigast att äga?</summary><p style="color:#64748b">Toyota Corolla 1.8 Hybrid kostar bara 4 028 kr/mån — billigast av alla modeller vi jämfört.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Är elbil billigare än bensinbil?</summary><p style="color:#64748b">Det beror på modell. Billigaste elbilen (Peugeot e-208, 5 037 kr/mån) är dyrare än billigaste hybriden (Toyota Corolla, 4 028 kr/mån), men billigare än många bensinbilar.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Hur räknar Bilkoll?</summary><p style="color:#64748b">Vi summerar värdeminskning (baserad på verkliga begagnatpriser), drivmedel, fordonsskatt, försäkring, service och däck. Alla priser från Skatteverket och AutoUncle.</p></details>
