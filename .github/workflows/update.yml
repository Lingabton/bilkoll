name: Update data and deploy

on:
  schedule:
    - cron: '0 5 * * 1'  # Varje måndag kl 05:00 UTC
  workflow_dispatch:       # Manuell trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          pip install playwright beautifulsoup4 requests pillow
          playwright install chromium --with-deps

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Scrape prices from AutoUncle
        run: cd scraper && python autouncle.py

      - name: Calculate TCO
        run: cd scraper && python tco_engine.py

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Generate SEO pages
        run: python scripts/generate_pages.py

      - name: Generate OG images
        run: python scripts/generate_og.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: update prices and rebuild site $(date +%Y-%m-%d)"
          git push
