        <p style="color:#94a3b8;font-size:12px;margin-top:24px">Beräknat med 4 års ägande, 1 500 mil/år. Nybilspriser: Skatteverket SKVFS 2025:29. Begagnatpriser: AutoUncle. Bilkoll av Gabriel Linton, Olav Innovation AB.</p>
        <h2 style="font-size:18px;font-weight:700;margin:24px 0 12px">Vanliga frågor</h2>
        <details><summary style="font-weight:600;cursor:pointer">Vad kostar en bil i månaden?</summary><p style="color:#64748b">En bil kostar mellan 4 175 och 9 153 kr/mån beroende på modell. Snittet för våra 29 modeller är cirka 6 705 kr/mån.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Vilken bil är billigast att äga?</summary><p style="color:#64748b">Toyota Corolla 1.8 Hybrid kostar bara 4 175 kr/mån — billigast av alla modeller vi jämfört.</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Är elbil billigare än bensinbil?</summary><p style="color:#64748b">Det beror på modell. Billigaste elbilen (BYD Atto, 5 268 kr/mån) är dyrare än billigaste hybriden (Toyota Corolla, 4 175 kr/mån).</p></details>
        <details><summary style="font-weight:600;cursor:pointer">Hur räknar Bilkoll?</summary><p style="color:#64748b">Vi summerar värdeminskning (baserad på verkliga begagnatpriser), drivmedel, fordonsskatt, försäkring, service, däck och besiktning. Alla priser från Skatteverket och AutoUncle.</p></details>
